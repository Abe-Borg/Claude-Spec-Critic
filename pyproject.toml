[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "mep-spec-review"
version = "1.2.0"
description = "MEP specification review tool for California K-12 DSA projects"
requires-python = ">=3.11"
dependencies = [
    "anthropic",
    "python-docx",
    "tiktoken",
    "customtkinter",
]