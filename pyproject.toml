[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "spec-critic"
version = "2.7.0"
dependencies = [
    "anthropic",
    "python-docx",
    "tiktoken",
    "customtkinter",
    "platformdirs"
]

[tool.setuptools.packages.find]
include = ["src*"]