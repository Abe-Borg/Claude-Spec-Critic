name: tests

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hermetic-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # The suite is hermetic (no API key, no network) per CLAUDE.md section 10:
      # conftest injects a placeholder ANTHROPIC_API_KEY and skips @pytest.mark.network.
      - name: Run hermetic test suite
        run: python -m pytest
